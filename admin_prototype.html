<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CitCare — prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Noto+Sans+Myanmar:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root{
    --bg:#faf9f7;--surface:#fff;--s2:#f4f2ee;--s3:#efece6;
    --ink:#1a1a18;--ink2:#6b6b66;--ink3:#9a9a93;
    --accent:#c96342;--accent-h:#b5512f;--accent-soft:#f4e7e1;
    --line:#e7e3dc;--line2:#d9d4cb;
    --green:#3f8f5f;--green-s:#e6f1ea;--amber:#b5862f;--amber-s:#f7eedd;--red:#c0392b;--red-s:#f8e7e4;--blue:#3573b5;--blue-s:#e6eff7;
    --shadow:0 1px 2px rgba(20,20,18,.04),0 4px 16px rgba(20,20,18,.05);
    --shadow-lg:0 8px 40px rgba(20,20,18,.12);
  }
  html.dark{
    --bg:#16151a;--surface:#1f1e24;--s2:#27262e;--s3:#2f2e37;
    --ink:#ece9f0;--ink2:#a09daa;--ink3:#6f6c79;
    --accent:#e07a55;--accent-h:#ec8a66;--accent-soft:#3a2a23;
    --line:#332f3b;--line2:#433e4d;
    --green:#5fcf8a;--green-s:#16331f;--amber:#e0b25a;--amber-s:#3a2e12;--red:#f08a7d;--red-s:#3a1714;--blue:#73a9e8;--blue-s:#1a2740;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.35);--shadow-lg:0 12px 48px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter','Noto Sans Myanmar',-apple-system,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
  .serif{font-family:'Fraunces','Noto Sans Myanmar',serif;font-weight:600;letter-spacing:-.01em}
  .my{font-family:'Noto Sans Myanmar','Inter',sans-serif}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .tnum{font-variant-numeric:tabular-nums}
  h1{margin:0;font-size:27px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow);transition:.18s}
  .kpi:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
  .nav{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:11px;font-size:14px;color:var(--ink2);cursor:pointer;transition:.15s;font-weight:500}
  .nav:hover{background:var(--s2);color:var(--ink)}
  .nav.on{background:var(--accent-soft);color:var(--accent)}
  .btn{display:inline-flex;align-items:center;gap:7px;border-radius:11px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:var(--surface);color:var(--ink);transition:.15s;white-space:nowrap}
  .btn:hover{background:var(--s2);border-color:var(--line2)}
  .btn:active{transform:scale(.97)}
  .btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn-p:hover{background:var(--accent-h)}
  .ico{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:10px;color:var(--ink3);cursor:pointer;transition:.15s}
  .ico:hover{background:var(--s2);color:var(--ink)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);padding:11px 16px}
  td{padding:12px 16px;border-top:1px solid var(--line)}
  tbody tr{transition:.12s}tbody tr:hover{background:var(--s2)}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  .badge{font-size:11px;padding:3px 9px;border-radius:7px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
  .b-en{background:var(--blue-s);color:var(--blue)}.b-my{background:var(--accent-soft);color:var(--accent-h)}
  .b-ok{background:var(--green-s);color:var(--green)}.b-w{background:var(--amber-s);color:var(--amber)}.b-r{background:var(--red-s);color:var(--red)}.b-n{background:var(--s2);color:var(--ink2)}
  .inp{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:9px 13px;font-size:14px;color:var(--ink);outline:none;width:100%;font-family:inherit;transition:.15s}
  .inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .page{display:none;animation:fade .25s ease}.page.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .bar{height:7px;border-radius:5px;background:var(--accent-soft);overflow:hidden}.bar>i{display:block;height:100%;background:var(--accent);opacity:.6}
  .chip{font-size:12px;padding:4px 11px;border-radius:20px;border:1px solid var(--line);cursor:pointer;color:var(--ink2);transition:.15s;background:var(--surface)}
  .chip:hover{border-color:var(--accent);color:var(--accent)}
  .scroll::-webkit-scrollbar{width:9px;height:9px}.scroll::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--bg);padding:11px 18px;border-radius:12px;font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);opacity:0;transition:.25s;z-index:100;display:flex;align-items:center;gap:8px}
  #toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .ov{position:fixed;inset:0;background:rgba(20,20,18,.45);display:none;align-items:center;justify-content:center;z-index:90;backdrop-filter:blur(3px)}
  .ov.show{display:flex;animation:fade .2s}
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow-lg);width:440px;max-width:calc(100vw - 32px);padding:22px}
  .dot{width:9px;height:9px;border-radius:50%}
  .spin{animation:sp 1s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div style="display:flex;height:100vh;overflow:hidden">
  <!-- SIDEBAR -->
  <aside class="scroll" style="width:230px;flex-shrink:0;height:100vh;overflow-y:auto;background:var(--surface);border-right:1px solid var(--line);padding:18px 13px">
    <div style="display:flex;align-items:center;gap:10px;padding:6px 10px 20px">
      <span style="width:30px;height:30px;border-radius:9px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center"><i data-lucide="pill" style="width:17px"></i></span>
      <span style="font-size:16px;font-weight:700">CitCare</span>
    </div>
    <nav id="nav" style="display:flex;flex-direction:column;gap:3px"></nav>
  </aside>
  <!-- MAIN -->
  <div style="flex:1;display:flex;flex-direction:column;min-width:0">
    <header style="display:flex;align-items:center;gap:12px;padding:12px 26px;border-bottom:1px solid var(--line);background:var(--surface)">
      <span style="font-size:13px;color:var(--ink3)">Admin</span><i data-lucide="chevron-right" style="width:14px;color:var(--ink3)"></i>
      <span id="crumb" style="font-size:14px;font-weight:600">Dashboard</span>
      <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
        <div onclick="toast('Search is wired in the live app')" style="display:flex;align-items:center;gap:8px;background:var(--s2);border-radius:11px;padding:8px 13px;width:230px;cursor:text;color:var(--ink3);font-size:13px"><i data-lucide="search" style="width:15px"></i>Search…<span style="margin-left:auto" class="mono" style="font-size:11px">⌘K</span></div>
        <span class="badge b-ok" style="margin:0 4px"><span class="dot" style="background:var(--green)"></span>live</span>
        <div class="ico" onclick="toggleTheme()" id="themeBtn" title="Theme"><i data-lucide="moon" style="width:17px"></i></div>
        <div class="ico" onclick="toast('Account menu (prototype)')"><span style="width:26px;height:26px;border-radius:50%;background:var(--blue-s);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700">AD</span></div>
      </div>
    </header>
    <main class="scroll" style="flex:1;overflow-y:auto;padding:26px 30px"><div id="pages" style="max-width:1060px;margin:0 auto"></div></main>
  </div>
</div>
<div id="toast"></div>
<div class="ov" id="ov" onclick="if(event.target===this)closeModal()"><div class="modal" id="modal"></div></div>

<script>
const NAV=[['dashboard','Dashboard','layout-dashboard'],['chat','Chat tester','message-circle'],['data','Data','database'],
['ftp','SFTP uploads','server'],['embed','Embed widget','code-2'],['conversations','Conversations','messages-square'],
['graph','Knowledge graph','share-2'],['tenants','Tenants','building-2'],['stores','Stores','store'],
['agent','Agent config','bot'],['eval','Evaluation','flask-conical'],['users','Users','users'],['settings','Settings','settings']];
let cur='dashboard';
const $=s=>document.querySelector(s);
function toast(m,ic='check'){const t=$('#toast');t.innerHTML=`<i data-lucide="${ic}" style="width:15px"></i>${m}`;t.classList.add('show');lucide.createIcons();clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function toggleTheme(){document.documentElement.classList.toggle('dark');const d=document.documentElement.classList.contains('dark');$('#themeBtn').innerHTML=`<i data-lucide="${d?'sun':'moon'}" style="width:17px"></i>`;lucide.createIcons();}
function openModal(html){$('#modal').innerHTML=html;$('#ov').classList.add('show');lucide.createIcons();}
function closeModal(){$('#ov').classList.remove('show')}

/* ---------- pages ---------- */
const P={};
P.dashboard=()=>`
<div style="display:flex;align-items:flex-end;gap:12px;margin-bottom:20px">
  <div><h1 class="serif">Dashboard</h1><div style="margin-top:6px;font-size:13px;color:var(--ink2)">Live overview of the agent + data</div></div>
  <div style="margin-left:auto;display:flex;gap:8px">
    <span class="badge b-n" style="align-self:center">data v18</span>
    <button class="btn btn-p" onclick="reload(this)"><i data-lucide="refresh-cw" style="width:15px"></i>Reload</button>
  </div>
</div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:14px">
  ${kpi('Cache hit rate','95.6%','+2.1','up','zap')}${kpi('p95 latency','20<span style="font-size:14px;color:var(--ink3)"> ms</span>','','','gauge')}
  ${kpi('Requests today','2,161','+18%','up','activity')}${kpi('Errors','0','24h','ok','shield-check')}
</div>
<div style="display:grid;grid-template-columns:1.7fr 1fr;gap:13px;margin-bottom:13px">
  <div class="card" style="padding:18px">
    <div style="display:flex;align-items:center;margin-bottom:14px"><b style="font-size:14px">Requests · last 12h</b><span style="margin-left:auto;font-size:12px;color:var(--ink2)">cache vs llm</span></div>
    <svg viewBox="0 0 580 120" style="width:100%;height:120px"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--accent)" stop-opacity=".18"/><stop offset="1" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>
    <path d="M0,96 48,80 96,84 144,60 192,66 240,42 288,50 336,30 384,36 432,22 480,30 528,16 580,22 V120 H0 Z" fill="url(#g)"/>
    <polyline points="0,96 48,80 96,84 144,60 192,66 240,42 288,50 336,30 384,36 432,22 480,30 528,16 580,22" fill="none" stroke="var(--accent)" stroke-width="2.5"/>
    <polyline points="0,108 48,106 96,107 144,101 192,103 240,96 288,98 336,94 384,96 432,92 480,94 528,90 580,91" fill="none" stroke="var(--line2)" stroke-width="1.5"/></svg>
  </div>
  <div class="card" style="padding:18px"><b style="font-size:14px">Data status</b>
    <table style="margin-top:8px"><tbody>${[['Catalog','4,892'],['Inventory','111,654'],['Sites','53'],['Graph edges','16,920']].map(r=>`<tr><td style="border:0;color:var(--ink2);padding:6px 0">${r[0]}</td><td style="border:0;text-align:right" class="num">${r[1]}</td></tr>`).join('')}</tbody></table>
  </div>
</div>
<div class="card">
  <div style="display:flex;align-items:center;padding:15px 18px;border-bottom:1px solid var(--line)"><b style="font-size:14px">Top articles by stock</b><span class="badge b-w" style="margin-left:auto">materialized view</span></div>
  <table><thead><tr><th>Code</th><th>Brand</th><th class="num">Total stock</th><th class="num">Avg price</th><th class="num">Sites</th></tr></thead><tbody>
  ${[['1000000015837','ROYAL-D 25G','37,605','800'],['1000000323607','RED CROSS ORS','19,611','850'],['1000000394376','ALMACID SUSP','18,621','2,500']].map(r=>`<tr style="cursor:pointer" onclick="go('graph');toast('Opened in knowledge graph')"><td class="mono">${r[0]}</td><td>${r[1]}</td><td class="num">${r[2]}</td><td class="num">${r[3]} MMK</td><td class="num">53</td></tr>`).join('')}</tbody></table>
</div>`;

P.chat=()=>`<h1 class="serif">Chat tester</h1><p style="color:var(--ink2);margin:7px 0 16px">Talk to the live agent — English or Burmese. Streams token-by-token.</p>
<div class="card" style="overflow:hidden;height:64vh;display:flex;flex-direction:column">
  <div style="padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px"><span class="dot" style="background:var(--green)"></span><b>CityCare Agent</b><span style="margin-left:auto;font-size:12px;color:var(--ink3)">online · Gemini</span></div>
  <div class="scroll" id="msgs" style="flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:13px;background:var(--bg)">
    ${bub('a','Hi! Ask about stock, prices, substitutes, or indications — in English or Burmese (မြန်မာ).')}
  </div>
  <div style="padding:10px 14px 4px;display:flex;gap:7px;flex-wrap:wrap">${['stock of 1000000024029','top 5 at CCBHSC','ဖျားနာ အတွက် ဘာဆေး'].map(c=>`<span class="chip" onclick="$('#ci').value='${c}'">${c}</span>`).join('')}</div>
  <div style="padding:12px 14px;display:flex;gap:10px"><input class="inp" id="ci" placeholder="Message…" onkeydown="if(event.key==='Enter')sendChat()"><button class="btn btn-p" onclick="sendChat()"><i data-lucide="send" style="width:15px"></i>Send</button></div>
</div>`;

P.data=()=>`<div style="display:flex;align-items:center;margin-bottom:16px"><div><h1 class="serif">Data</h1><div style="margin-top:6px;font-size:13px;color:var(--ink2)">Browse + upload catalog & inventory</div></div>
<div style="margin-left:auto;display:flex;gap:8px"><button class="btn" onclick="toast('Uploaded articles.xlsx → 4,892 rows','upload')"><i data-lucide="upload" style="width:15px"></i>Upload xlsx</button><button class="btn btn-p" onclick="reload(this)"><i data-lucide="refresh-cw" style="width:15px"></i>Reload</button></div></div>
<b style="font-size:14px">Catalog</b><div style="max-width:380px;margin:9px 0 10px"><input class="inp" placeholder="Search brand, generic or code…" oninput="filterCat(this.value)"></div>
<div class="card" style="overflow:hidden"><div class="scroll" style="max-height:300px;overflow-y:auto"><table><thead><tr><th>Code</th><th>Brand</th><th>Generic</th></tr></thead><tbody id="catb">${catRows('')}</tbody></table></div>
<div style="display:flex;align-items:center;padding:9px 16px;border-top:1px solid var(--line);font-size:12px;color:var(--ink3)">showing 50 · <button class="btn" style="margin-left:auto;padding:5px 11px" onclick="toast('Prev page')">Prev</button><span style="margin:0 10px">page 1</span><button class="btn" style="padding:5px 11px" onclick="toast('Next page')">Next</button></div></div>`;

P.graph=()=>`<h1 class="serif">Knowledge graph</h1><p style="color:var(--ink2);margin:7px 0 14px">Click a medicine to highlight its connections + open details.</p>
<div style="display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap">${[['has_generic','3,278','var(--blue)'],['contains','7,964','var(--amber)'],['treats','938','var(--green)']].map(c=>`<span class="badge b-n"><span class="dot" style="background:${c[2]}"></span>${c[0]} ${c[1]}</span>`).join('')}</div>
<div style="display:flex;gap:0;border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:var(--shadow)">
  <svg id="gsvg" viewBox="0 0 520 420" style="flex:1;height:420px;cursor:pointer;background:var(--surface)"></svg>
  <div id="gp" style="width:0;flex-shrink:0;border-left:1px solid var(--line);background:var(--s2);overflow:hidden;transition:width .22s"><div style="width:280px;padding:18px" id="gpb"></div></div>
</div>`;

P.tenants=()=>`<h1 class="serif">Tenants</h1><p style="color:var(--ink2);margin:7px 0 16px">Embed credentials per client site.</p>
<button class="btn btn-p" style="margin-bottom:14px" onclick="addTenant()"><i data-lucide="plus" style="width:15px"></i>Add credential</button>
<div class="card" style="overflow:hidden"><table><thead><tr><th>embed_id</th><th>public_key</th><th class="num"></th></tr></thead><tbody id="tenb">
${[['citcare-web','pk_live_8f3a…'],['citcare-pos','pk_live_2b7c…']].map(r=>tenRow(r[0],r[1])).join('')}</tbody></table></div>`;

P.users=()=>`<h1 class="serif">Users</h1><p style="color:var(--ink2);margin:7px 0 16px">Admin accounts. No self-signup — you create users. Email = identity; LDAP/SSO merge by email.</p>
<button class="btn btn-p" style="margin-bottom:14px" onclick="addUser()"><i data-lucide="user-plus" style="width:15px"></i>Create user</button>
<div class="card" style="overflow:hidden"><table><thead><tr><th>Email</th><th>Name</th><th>Role</th><th>Sources</th><th class="num"></th></tr></thead><tbody id="usb">
${[['admin@citcare.local','Super Admin','super_admin','b-w','local'],['ops@citcare.local','Ops Lead','admin','b-en','oidc'],['branch60@citcare.local','Branch 20060','user','b-en','ldap']].map(r=>usrRow(r)).join('')}</tbody></table></div>`;

P.stores=()=>`<h1 class="serif">Stores</h1><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin:16px 0">${kpi('Sites','53','','','store')}${kpi('Total units','2.1M','','','boxes')}${kpi('Stock value','14.2B<span style="font-size:13px;color:var(--ink3)"> MMK</span>','','','wallet')}</div>
<div class="card" style="overflow:hidden"><table><thead><tr><th>Site</th><th class="num">SKUs</th><th class="num">Units</th><th style="width:200px">Stock value</th></tr></thead><tbody>
${[['20043-CCSJ',2292,58128,100],['20015-CCGV',2126,38131,77],['20026-CC19',2410,61204,69],['20052-CCTLKK',1980,29844,38],['20060-CCBHSC',2661,33120,34]].map(s=>`<tr><td>${s[0]}</td><td class="num">${s[1].toLocaleString()}</td><td class="num">${s[2].toLocaleString()}</td><td><div style="display:flex;align-items:center;gap:10px"><div class="bar" style="flex:1"><i style="width:${s[3]}%"></i></div><span class="num" style="font-size:12px;color:var(--ink2);white-space:nowrap">${(s[3]*5.7).toFixed(0)}M</span></div></td></tr>`).join('')}</tbody></table></div>`;

P.ftp=()=>`<div style="display:flex;align-items:center;margin-bottom:7px"><h1 class="serif">SFTP uploads</h1><div style="margin-left:auto;display:flex;gap:8px"><button class="btn" onclick="toast('Uploaded','upload')"><i data-lucide="upload" style="width:15px"></i>Upload</button><button class="btn btn-p" onclick="reload(this)"><i data-lucide="refresh-cw" style="width:15px"></i>Ingest now</button></div></div>
<p style="color:var(--ink2);margin:0 0 16px">Drop xlsx over SFTP or upload manually — auto-ingests + busts cache.</p>
<div class="card" style="padding:18px;margin-bottom:16px"><b><i data-lucide="server" style="width:15px;vertical-align:-2px"></i> Connection</b><div style="display:grid;grid-template-columns:1fr 1fr;gap:7px 30px;font-size:13px;margin-top:11px">${[['Host','pharmacy.citcare.mm'],['Port','2222'],['User','pharma'],['Path','upload/']].map(r=>`<div style="display:flex;justify-content:space-between"><span style="color:var(--ink2)">${r[0]}</span><span class="mono">${r[1]}</span></div>`).join('')}</div></div>
${ftpT('Archived','check',[['articles-export.xlsx','628 KB'],['balance_stock.xlsx','3.5 MB']])}${ftpT('Failed','alert-triangle',[])}`;

P.embed=()=>`<div style="display:flex;align-items:center;margin-bottom:7px"><h1 class="serif">Embed widget</h1><button class="btn btn-p" style="margin-left:auto" onclick="toast('Widget preview loaded')"><i data-lucide="play" style="width:15px"></i>Load preview</button></div>
<p style="color:var(--ink2);margin:0 0 16px">Drop the chat widget on any site. Signed store_id locks answers to that branch.</p>
${codeC('Public widget','&lt;script src="…/api/embed/widget.js"\n  data-embed-id="web" data-stream="true" async&gt;&lt;/script&gt;')}
${codeC('Store-scoped (data by store)','&lt;script src="…/widget.js" data-user=\\'@json($user)\\'\n  data-user-sig="{{ $sig }}" async&gt;&lt;/script&gt;')}`;

P.agent=()=>`<h1 class="serif">Agent config</h1><div style="display:grid;grid-template-columns:1fr 1fr;gap:13px;margin:16px 0">${cfg('Model','google/gemini-3.5-flash')}${cfg('Embedding','gemini-embedding-2')}${cfg('Rate limit','30 / min')}${cfg('Cache TTL','600 s')}</div>
<div class="card" style="padding:18px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><b>System prompt</b><span class="badge b-w">custom</span></div>
<textarea class="inp mono" style="height:130px;font-size:12.5px;resize:vertical">You are the CitCare Pharmacy Assistant, bilingual (EN/Burmese). Detect language, reply same. Never translate codes. Use tools for every number. Cite sources.</textarea>
<div style="margin-top:11px;display:flex;gap:10px;align-items:center"><button class="btn btn-p" onclick="toast('Prompt saved')">Save prompt</button><span style="font-size:12px;color:var(--ink3)">applies on restart</span></div></div>`;

P.eval=()=>`<div style="display:flex;align-items:center;margin-bottom:16px"><h1 class="serif">Evaluation</h1><button class="btn btn-p" style="margin-left:auto" onclick="runEval(this)"><i data-lucide="play" style="width:15px"></i>Run eval</button></div>
<div class="card" id="evalcard" style="padding:20px;display:flex;align-items:center;gap:18px"><div style="font-size:36px;font-weight:700;color:var(--green)" class="serif">13/13</div><div><b>All passing</b><div style="font-size:13px;color:var(--ink2);margin-top:2px">100% · last run 2m ago · ~38s</div></div></div>
<div style="margin-top:14px" id="evrows">${[['en_full_info','full info for 1000000024029'],['my_total_stock','article ရဲ့ stock စုစုပေါင်း'],['en_top5','top 5 at CCBHSC']].map(e=>ev(e[0],e[1])).join('')}</div>`;

P.conversations=()=>`<h1 class="serif">Conversations</h1><div style="display:flex;gap:10px;margin:14px 0">${['All langs','Store filter'].map((x,i)=>i?`<input class="inp" style="width:170px" placeholder="${x}">`:`<select class="inp" style="width:130px"><option>${x}</option><option>EN</option><option>MY</option></select>`).join('')}</div>
${conv('EN','top 5 by stock at CCBHSC','Top 5: SILOXOGENE 208, TERUMO 180, ELECTRAL 167…','20060-CCBHSC',1,'6 ms')}
${conv('MY','<span class="my">ဖျားနာ အတွက် ဘာဆေး ရှိလဲ</span>','<span class="my">PARACAP၊ BIOGESIC ရရှိနိုင်ပါသည်။</span>','all',0,'1.2 s')}
${conv('EN','total stock of 1000000024029','14,963 across all sites (from inventory).','all',0,'8.7 s')}`;

P.settings=()=>`<h1 class="serif">Settings</h1><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin:16px 0">
${['Models|gemini-3.5-flash · embedding-2','Auth|local · LDAP · Keycloak','Data|4,892 cat · 111,654 inv'].map(c=>{const[a,b]=c.split('|');return `<div class="card" style="padding:16px"><b>${a}</b><div style="font-size:13px;color:var(--ink2);margin-top:6px">${b}</div></div>`}).join('')}</div>
<div class="card" style="padding:18px;border-color:var(--amber)"><div style="display:flex;align-items:center;gap:8px;color:var(--amber);font-weight:700;margin-bottom:10px"><i data-lucide="shield-alert" style="width:16px"></i>Security</div><ul style="font-size:13px;color:var(--ink2);margin:0;padding-left:18px;line-height:2"><li>Rotate the OpenRouter key</li><li>32-byte SECRET_KEY matching Laravel</li><li>SFTP key-auth only in production</li><li>Tighten CORS before public deploy</li></ul></div>`;

/* ---------- helpers ---------- */
function kpi(l,v,d,t,ic){const dc=t==='up'?'var(--green)':t==='ok'?'var(--green)':'var(--ink3)';return `<div class="kpi"><div style="display:flex;align-items:center;margin-bottom:8px"><span style="font-size:12px;color:var(--ink2)">${l}</span><i data-lucide="${ic}" style="width:15px;margin-left:auto;color:var(--ink3)"></i></div><div style="display:flex;align-items:baseline;gap:7px"><span style="font-size:25px;font-weight:700" class="tnum">${v}</span>${d?`<span style="font-size:12px;color:${dc}">${t==='up'?'▲ ':''}${d}</span>`:''}</div></div>`}
function cfg(k,v){return `<div class="card" style="padding:16px"><div style="font-size:12px;color:var(--ink2)">${k} <span style="color:var(--ink3)">· .env</span></div><div style="font-size:15px;font-weight:600;margin-top:4px">${v}</div></div>`}
function bub(r,t){return `<div style="display:flex;${r==='u'?'justify-content:flex-end':''}"><div style="max-width:80%;padding:10px 14px;border-radius:15px;font-size:14px;line-height:1.55;${r==='u'?'background:var(--accent);color:#fff;border-bottom-right-radius:5px':'background:var(--surface);border:1px solid var(--line);border-bottom-left-radius:5px'}">${t}</div></div>`}
function conv(l,q,a,s,c,lat){return `<div class="card" style="padding:15px 17px;margin-bottom:11px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span class="badge ${l==='MY'?'b-my':'b-en'}">${l}</span><b>${q}</b>${c?'<span class="badge b-ok">cached</span>':''}</div><p style="font-size:13px;color:var(--ink2);margin:0 0 8px">${a}</p><div style="font-size:12px;color:var(--ink3);display:flex;gap:14px"><span>store: ${s}</span><span>${lat}</span></div></div>`}
function ftpT(t,ic,rows){const b=rows.length?rows.map(r=>`<tr><td><i data-lucide="file-spreadsheet" style="width:14px;color:var(--ink3);vertical-align:-2px;margin-right:6px"></i>${r[0]}</td><td class="num" style="color:var(--ink2)">${r[1]}</td></tr>`).join(''):`<tr><td colspan="2" style="color:var(--ink3)">None.</td></tr>`;return `<div style="margin-bottom:16px"><div style="display:flex;align-items:center;gap:8px;font-weight:600;margin-bottom:8px"><i data-lucide="${ic}" style="width:15px"></i>${t} <span class="badge b-n">${rows.length}</span></div><div class="card" style="overflow:hidden"><table><thead><tr><th>File</th><th class="num">Size</th></tr></thead><tbody>${b}</tbody></table></div></div>`}
function codeC(l,code){return `<div style="margin-bottom:16px"><div style="display:flex;margin-bottom:8px"><b>${l}</b><span class="btn" style="margin-left:auto;padding:5px 11px;font-size:12px" onclick="toast('Copied to clipboard','copy')"><i data-lucide="copy" style="width:13px"></i>Copy</span></div><pre class="mono card" style="padding:15px;font-size:12.5px;overflow-x:auto;margin:0;white-space:pre-wrap">${code}</pre></div>`}
function ev(id,q){return `<div class="card" style="padding:13px 15px;margin-bottom:9px"><div style="display:flex;align-items:center;gap:9px"><i data-lucide="check" style="width:16px;color:var(--green)"></i><span class="mono" style="font-size:12px;color:var(--ink3)">${id}</span><b style="font-weight:600">${q}</b><span class="badge b-ok" style="margin-left:auto">pass</span></div></div>`}
const CAT=[['1000000024029','PARACAP PARACETAMOL 10`S','Paracetamol'],['1000000384200','YSI PARA-TAB 500MG','Paracetamol'],['1000000009840','ALAXAN 10`S','Para & Ibuprofen'],['1000000015837','ROYAL-D 25G','Electrolyte'],['1000000131948','BIOGESIC 500MG','Paracetamol'],['1000000332083','METFORMIN 500MG','Metformin'],['1000000008752','SILOXOGENE 10`S','Alumina/Mg']];
function catRows(q){return CAT.filter(r=>(r[0]+r[1]+r[2]).toLowerCase().includes(q.toLowerCase())).map(r=>`<tr style="cursor:pointer" onclick="go('graph')"><td class="mono">${r[0]}</td><td>${r[1]}</td><td style="color:var(--ink2)">${r[2]}</td></tr>`).join('')||`<tr><td colspan=3 style="color:var(--ink3);text-align:center;padding:24px">No matches</td></tr>`}
function filterCat(q){$('#catb').innerHTML=catRows(q)}
function tenRow(e,k){return `<tr><td>${e}</td><td class="mono" style="color:var(--ink2)">${k}</td><td class="num"><i data-lucide="trash-2" style="width:15px;color:var(--ink3);cursor:pointer" onclick="this.closest('tr').remove();toast('Credential removed','trash-2')"></i></td></tr>`}
function usrRow(r){return `<tr><td>${r[0]}</td><td>${r[1]}</td><td><span class="badge ${r[3]}">${r[2]}</span></td><td style="color:var(--ink2)">${r[4]}</td><td class="num">${r[2]==='super_admin'?'<i data-lucide="lock" style="width:14px;color:var(--ink3)"></i>':`<i data-lucide="trash-2" style="width:15px;color:var(--ink3);cursor:pointer" onclick="this.closest('tr').remove();toast('User removed','trash-2')"></i>`}</td></tr>`}

/* ---------- interactions ---------- */
function reload(b){const o=b.innerHTML;b.innerHTML='<i data-lucide="loader-2" class="spin" style="width:15px"></i>Reloading';lucide.createIcons();setTimeout(()=>{b.innerHTML=o;lucide.createIcons();toast('Data reloaded · cache cleared');},1100);}
function sendChat(){const i=$('#ci'),m=i.value.trim();if(!m)return;i.value='';const box=$('#msgs');box.insertAdjacentHTML('beforeend',bub('u',m));const b=document.createElement('div');box.insertAdjacentHTML('beforeend',bub('a','<span style="color:var(--ink3)">…</span>'));box.scrollTop=box.scrollHeight;lucide.createIcons();
  const ans=/ဖျား|para|ဆေး/i.test(m)?'PARACAP PARACETAMOL 10`S — total stock <b>14,963</b> across 53 sites (from inventory).<br><br>Please consult a licensed pharmacist before use.':'I can look that up. The total balance stock is <b>14,963</b> units (from inventory). Please consult a licensed pharmacist before use.';
  setTimeout(()=>{box.lastElementChild.querySelector('div').innerHTML=ans;box.scrollTop=box.scrollHeight;},700);}
function addUser(){openModal(`<div style="display:flex;align-items:center;gap:9px;margin-bottom:16px"><span style="width:32px;height:32px;border-radius:9px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center"><i data-lucide="user-plus" style="width:16px"></i></span><b style="font-size:16px">Create user</b><i data-lucide="x" style="width:18px;margin-left:auto;cursor:pointer;color:var(--ink3)" onclick="closeModal()"></i></div>
  <div style="display:flex;flex-direction:column;gap:10px"><input class="inp" id="ue" placeholder="email"><input class="inp" id="un" placeholder="name"><input class="inp" type="password" placeholder="password (blank = SSO only)"><select class="inp" id="ur"><option>user</option><option>admin</option><option>super_admin</option></select></div>
  <button class="btn btn-p" style="width:100%;justify-content:center;margin-top:16px" onclick="const e=$('#ue').value||'new@citcare.local';$('#usb').insertAdjacentHTML('beforeend',usrRow([e,$('#un').value||'New User',$('#ur').value,'b-en','local']));lucide.createIcons();closeModal();toast('User created');">Create user</button>`);}
function addTenant(){openModal(`<div style="display:flex;align-items:center;gap:9px;margin-bottom:16px"><b style="font-size:16px">Add credential</b><i data-lucide="x" style="width:18px;margin-left:auto;cursor:pointer;color:var(--ink3)" onclick="closeModal()"></i></div>
  <div style="display:flex;flex-direction:column;gap:10px"><input class="inp" id="te" placeholder="embed_id"><input class="inp" id="tk" placeholder="public_key"></div>
  <button class="btn btn-p" style="width:100%;justify-content:center;margin-top:16px" onclick="$('#tenb').insertAdjacentHTML('beforeend',tenRow($('#te').value||'new-client',$('#tk').value||'pk_live_xxxx'));lucide.createIcons();closeModal();toast('Credential added');">Add</button>`);}
function runEval(b){const o=b.innerHTML;b.innerHTML='<i data-lucide="loader-2" class="spin" style="width:15px"></i>Running';lucide.createIcons();$('#evalcard').style.opacity='.5';
  setTimeout(()=>{b.innerHTML=o;$('#evalcard').style.opacity='1';lucide.createIcons();toast('Eval complete · 13/13 passing');},1600);}

/* ---------- graph ---------- */
function drawGraph(){const svg=$('#gsvg');if(!svg)return;
  const drugs=['PARACAP','BIOGESIC','ALAXAN','BRUSTAN','DECOLGEN','AMOXIL','METFORMIN','ROYAL-D'];
  const hubs={paracetamol:'#B45309',ibuprofen:'#B45309',fever:'#16A34A',pain:'#16A34A',infection:'#16A34A',diabetes:'#16A34A',electrolyte:'#B45309'};
  const E=[['PARACAP','paracetamol'],['BIOGESIC','paracetamol'],['ALAXAN','paracetamol'],['ALAXAN','ibuprofen'],['BRUSTAN','ibuprofen'],['DECOLGEN','paracetamol'],['PARACAP','fever'],['PARACAP','pain'],['BIOGESIC','fever'],['ALAXAN','pain'],['AMOXIL','infection'],['METFORMIN','diabetes'],['ROYAL-D','electrolyte']];
  const pos={},cx=260,cy=210;const hk=Object.keys(hubs);hk.forEach((h,i)=>{const a=i/hk.length*6.283;pos[h]=[cx+150*Math.cos(a),cy+150*Math.sin(a)]});
  drugs.forEach((d,i)=>{const a=i/drugs.length*6.283+.4;pos[d]=[cx+78*Math.cos(a),cy+78*Math.sin(a)]});
  let h='';E.forEach(([a,b])=>{if(pos[a]&&pos[b])h+=`<line x1="${pos[a][0]}" y1="${pos[a][1]}" x2="${pos[b][0]}" y2="${pos[b][1]}" stroke="var(--line2)" stroke-width="1.2" opacity=".5"/>`});
  hk.forEach(hh=>{h+=`<g style="cursor:pointer" onclick="gpanel('${hh}')"><circle cx="${pos[hh][0]}" cy="${pos[hh][1]}" r="9" fill="${hubs[hh]}"/><text x="${pos[hh][0]+12}" y="${pos[hh][1]+4}" font-size="11" font-weight="600" fill="${hubs[hh]}">${hh}</text></g>`});
  drugs.forEach(d=>{h+=`<g style="cursor:pointer" onclick="gpanel('${d}')"><circle cx="${pos[d][0]}" cy="${pos[d][1]}" r="6" fill="#1E40AF" stroke="var(--surface)" stroke-width="1.5"/><text x="${pos[d][0]+9}" y="${pos[d][1]+3}" font-size="9" fill="var(--ink2)">${d}</text></g>`});
  svg.innerHTML=h;}
function gpanel(id){const data={PARACAP:{stock:'14,963',contains:['paracetamol'],treats:['fever','pain'],gen:['BIOGESIC','PANADOL','TYLENOL']},ALAXAN:{stock:'3,120',contains:['paracetamol','ibuprofen'],treats:['pain','inflammation'],gen:['BRUSTAN']}}[id]||{stock:'—',contains:[],treats:[],gen:[]};
  const chip=(t,c)=>`<span class="badge" style="background:${c}1a;color:${c};margin:2px 4px 2px 0">${t}</span>`;
  $('#gpb').innerHTML=`<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px"><span class="dot" style="background:#1E40AF;margin-top:6px"></span><div><b style="font-size:15px">${id}</b><div style="font-size:11px;color:var(--ink3)">medicine</div></div><i data-lucide="x" style="width:17px;margin-left:auto;cursor:pointer;color:var(--ink3)" onclick="$('#gp').style.width='0'"></i></div>
  ${data.stock!=='—'?`<div style="font-size:13px;color:var(--ink2);margin:8px 0 12px">In stock: <b style="color:var(--ink)">${data.stock}</b> units</div>`:''}
  ${data.contains.length?`<div style="margin-top:10px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#B45309;margin-bottom:5px">Contains</div>${data.contains.map(x=>chip(x,'#B45309')).join('')}</div>`:''}
  ${data.treats.length?`<div style="margin-top:12px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#16A34A;margin-bottom:5px">Treats</div>${data.treats.map(x=>chip(x,'#16A34A')).join('')}</div>`:''}
  ${data.gen.length?`<div style="margin-top:12px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#1E40AF;margin-bottom:5px">Same generic</div>${data.gen.map(x=>chip(x,'#1E40AF')).join('')}</div>`:''}`;
  $('#gp').style.width='280px';lucide.createIcons();}

/* ---------- router ---------- */
$('#nav').innerHTML=NAV.map(n=>`<div class="nav" data-p="${n[0]}" onclick="go('${n[0]}')"><i data-lucide="${n[2]}" style="width:18px"></i>${n[1]}</div>`).join('');
function go(p){cur=p;$('#pages').innerHTML=P[p]();$('#crumb').textContent=(NAV.find(n=>n[0]===p)||[,'?'])[1];
  document.querySelectorAll('.nav').forEach(n=>n.classList.toggle('on',n.dataset.p===p));
  lucide.createIcons();if(p==='graph')setTimeout(drawGraph,30);}
go('dashboard');
</script>
</body>
</html>
