<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Pharma</title>
<style>
  :root{ --accent:#c96342; --bg:#f7f6f4; --panel:#fff; --line:#e3e1dc; --text:#1a1a18; --muted:#6b6b66; --user:#c96342; --bot:#f0eee9; }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
  header{background:var(--panel);border-bottom:1px solid var(--line);padding:14px 20px;display:flex;align-items:center;gap:10px}
  header .dot{width:9px;height:9px;border-radius:50%;background:#3fae6a}
  header h1{font-size:16px;margin:0;font-weight:700}
  header .sub{font-size:12px;color:var(--muted);margin-left:auto}
  #chat{flex:1;overflow-y:auto;padding:24px;max-width:820px;width:100%;margin:0 auto}
  .msg{margin:14px 0;display:flex}
  .msg.user{justify-content:flex-end}
  .bubble{max-width:78%;padding:11px 15px;border-radius:14px;line-height:1.55;white-space:pre-wrap;word-wrap:break-word;font-size:14.5px}
  .user .bubble{background:var(--user);color:#fff;border-bottom-right-radius:4px}
  .bot .bubble{background:var(--bot);border:1px solid var(--line);border-bottom-left-radius:4px}
  .bubble strong{font-weight:700}
  .step{font-size:12px;color:var(--muted);font-style:italic;margin:4px 0 0 4px}
  .bar{background:var(--panel);border-top:1px solid var(--line);padding:14px 20px}
  .bar form{display:flex;gap:10px;max-width:820px;margin:0 auto}
  #q{flex:1;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:14.5px;font-family:inherit;outline:none}
  #q:focus{border-color:var(--accent)}
  button{background:var(--accent);color:#fff;border:0;border-radius:10px;padding:0 20px;font-size:14px;font-weight:600;cursor:pointer}
  button:disabled{opacity:.5;cursor:default}
  .chips{max-width:820px;margin:0 auto 8px;display:flex;gap:8px;flex-wrap:wrap}
  .chip{font-size:12px;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:6px 12px;cursor:pointer;color:var(--muted)}
  .chip:hover{border-color:var(--accent);color:var(--accent)}
  .typing{display:inline-block;color:var(--muted)}
</style>
</head>
<body>
<header>
  <span class="dot"></span>
  <h1>City Pharma</h1>
  <span class="sub" id="status">connecting…</span>
</header>

<div id="chat">
  <div class="msg bot"><div class="bubble">Hi! Ask about stock, prices, substitutes, or indications — in English or Burmese (မြန်မာ).</div></div>
</div>

<div class="bar">
  <div class="chips" id="chips">
    <span class="chip">stock of article 1000000024029</span>
    <span class="chip">top 5 by stock at CCBHSC</span>
    <span class="chip">"para" ပါသော ဆေးများ</span>
    <span class="chip">ဖျားနာ အတွက် ဘာဆေးရှိလဲ</span>
  </div>
  <form id="form">
    <input id="q" autocomplete="off" placeholder="Message the pharmacy assistant…" />
    <button id="send" type="submit">Send</button>
  </form>
</div>

<script>
const chat=document.getElementById('chat'), form=document.getElementById('form'),
      q=document.getElementById('q'), send=document.getElementById('send'),
      statusEl=document.getElementById('status');
let token=null;

function addMsg(who){ const m=document.createElement('div'); m.className='msg '+who;
  const b=document.createElement('div'); b.className='bubble'; m.appendChild(b);
  chat.appendChild(m); chat.scrollTop=chat.scrollHeight; return b; }
function md(s){ return s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>'); }

async function session(){
  try{
    const r=await fetch('/api/embed/session/create',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({embed_id:'web-tester',public_key:'web-tester'})});
    token=(await r.json()).session_token; statusEl.textContent='online';
  }catch(e){ statusEl.textContent='offline'; }
}

async function ask(text){
  const ub=addMsg('user'); ub.textContent=text;
  const bb=addMsg('bot'); bb.innerHTML='<span class="typing">…</span>';
  send.disabled=true;
  let full='';
  try{
    const r=await fetch('/api/embed/chat/stream',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({session_token:token,message:text})});
    const reader=r.body.getReader(), dec=new TextDecoder(); let buf='';
    while(true){
      const {value,done}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true});
      let i;
      while((i=buf.indexOf('\n\n'))>=0){
        const frame=buf.slice(0,i); buf=buf.slice(i+2);
        let ev='message', data='';
        for(const line of frame.split('\n')){
          if(line.startsWith('event:')) ev=line.slice(6).trim();
          else if(line.startsWith('data:')) data+=line.slice(5).trim();
        }
        if(data==='[DONE]') continue;
        try{ const j=JSON.parse(data);
          if(ev==='step'){ /* could show activity */ }
          else if(j.delta){ full+=j.delta; bb.innerHTML=md(full); chat.scrollTop=chat.scrollHeight; }
        }catch(_){}
      }
    }
    if(!full) bb.textContent='(no response)';
  }catch(e){
    // fallback to non-streaming
    try{ const r=await fetch('/api/embed/chat',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({session_token:token,message:text})});
      bb.innerHTML=md((await r.json()).content||'(no response)');
    }catch(_){ bb.textContent='Error: '+e.message; }
  }
  send.disabled=false; q.focus();
}

form.addEventListener('submit',e=>{e.preventDefault(); const t=q.value.trim(); if(!t||!token)return; q.value=''; ask(t);});
document.getElementById('chips').addEventListener('click',e=>{ if(e.target.classList.contains('chip')){ q.value=e.target.textContent; q.focus(); }});
session();
</script>
</body>
</html>
