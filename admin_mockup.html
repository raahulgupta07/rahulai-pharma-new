<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CitCare Admin — full mockup</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root{
    --bg:#faf9f7; --surface:#ffffff; --surface2:#f4f2ee; --tertiary:#f0eee9;
    --ink:#1a1a18; --ink2:#6b6b66; --ink3:#9a9a93;
    --accent:#c96342; --accent-h:#b5512f; --accent-soft:#f3e7e1;
    --line:#e6e3dd; --line2:#d8d4cc;
    --green:#3f8f5f; --green-soft:#e7f1ea; --amber:#b5862f; --amber-soft:#f6eedd;
    --red:#c0392b; --red-soft:#f7e6e4; --blue:#3573b5; --blue-soft:#e7eff7;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  .serif{font-family:Georgia,'Times New Roman',serif}
  .tnum{font-variant-numeric:tabular-nums}
  .card{background:var(--surface);border:0.5px solid var(--line);border-radius:12px}
  .kpi{background:var(--surface);border:0.5px solid var(--line);border-radius:10px;padding:14px}
  .navlink{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;font-size:14px;color:var(--ink2);cursor:pointer;transition:background .18s,color .18s}
  .navlink:hover{background:rgba(0,0,0,.03);color:var(--ink)}
  .navlink.active{background:var(--accent-soft);color:var(--accent);font-weight:500}
  .btn{display:inline-flex;align-items:center;gap:8px;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--line);background:var(--surface);color:var(--ink);transition:background .18s}
  .btn:hover{background:var(--surface2)}
  .btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn-accent:hover{background:var(--accent-h)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;font-weight:500;font-size:12px;color:var(--ink2);padding:9px 16px}
  td{padding:10px 16px;border-top:0.5px solid var(--line)}
  tbody tr{transition:background .15s}
  tbody tr:hover{background:var(--surface2)}
  .badge{font-size:11px;padding:2px 8px;border-radius:8px;font-weight:500}
  .b-en{background:var(--blue-soft);color:var(--blue)}
  .b-my{background:var(--accent-soft);color:var(--accent-h)}
  .b-ok{background:var(--green-soft);color:var(--green)}
  .b-warn{background:var(--amber-soft);color:var(--amber)}
  .input{background:var(--surface);border:0.5px solid var(--line);border-radius:10px;padding:8px 12px;font-size:14px;color:var(--ink);outline:none;width:100%}
  .input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .page{display:none}
  .page.active{display:block}
  .bar{height:6px;border-radius:4px;background:var(--accent-soft);overflow:hidden}
  .bar > span{display:block;height:100%;background:var(--accent);opacity:.55}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px}
</style>
</head>
<body>
<div style="display:flex;height:100vh;overflow:hidden">

  <!-- SIDEBAR (fixed) -->
  <aside style="width:212px;flex-shrink:0;height:100vh;overflow-y:auto;background:var(--surface2);border-right:0.5px solid var(--line);padding:16px 12px">
    <div style="display:flex;align-items:center;gap:9px;padding:6px 10px 18px">
      <span style="width:9px;height:9px;border-radius:50%;background:var(--green)"></span>
      <span style="font-size:15px;font-weight:500">CitCare admin</span>
    </div>
    <nav id="nav" style="display:flex;flex-direction:column;gap:2px"></nav>
    <div style="margin-top:18px;padding:10px;border-top:0.5px solid var(--line)">
      <div class="navlink" onclick="go('chat')"><i data-lucide="message-circle" style="width:17px"></i>Chat widget</div>
    </div>
  </aside>

  <!-- MAIN -->
  <div style="flex:1;display:flex;flex-direction:column;min-width:0">
    <!-- TOPBAR (fixed) -->
    <div style="display:flex;align-items:center;gap:12px;padding:11px 22px;border-bottom:0.5px solid var(--line);background:var(--surface)">
      <span style="font-size:13px;color:var(--ink3)">Admin</span>
      <i data-lucide="chevron-right" style="width:14px;color:var(--ink3)"></i>
      <span id="crumb" style="font-size:14px;font-weight:500">Dashboard</span>
      <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
        <div style="display:flex;align-items:center;gap:7px;background:var(--surface2);border-radius:10px;padding:7px 11px;width:210px">
          <i data-lucide="search" style="width:15px;color:var(--ink3)"></i>
          <span style="font-size:13px;color:var(--ink3)">Search…</span>
        </div>
        <span class="badge b-ok">live</span>
        <span style="width:28px;height:28px;border-radius:50%;background:var(--blue-soft);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500">AD</span>
      </div>
    </div>

    <!-- SCROLL REGION -->
    <main style="flex:1;overflow-y:auto;background:var(--bg);padding:24px 28px">
      <div id="pages" style="max-width:1040px;margin:0 auto"></div>
    </main>
  </div>
</div>

function ftpTable(title,icon,rows){
  let body = rows.length? rows.map(r=>`<tr><td><i data-lucide="file-spreadsheet" style="width:14px;color:var(--ink3);vertical-align:-2px;margin-right:6px"></i>${r[0]}</td><td style="text-align:right;color:var(--ink2)">${r[1]}</td><td style="text-align:right;color:var(--ink2)">${r[2]}</td></tr>`).join('')
    : `<tr><td colspan="3" style="color:var(--ink3)">None.</td></tr>`;
  return `<div style="margin-bottom:18px"><div style="display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;margin-bottom:8px"><i data-lucide="${icon}" style="width:15px"></i>${title} <span class="badge" style="background:var(--surface2);color:var(--ink2)">${rows.length}</span></div>
  <div class="card" style="overflow:hidden"><table><thead><tr><th>File</th><th style="text-align:right">Size</th><th style="text-align:right">Modified</th></tr></thead><tbody>${body}</tbody></table></div></div>`;
}

// render nav
const nav=document.getElementById('nav');
NAV.forEach(([id,label,icon])=>{
  const d=document.createElement('div');d.className='navlink';d.dataset.id=id;
  d.innerHTML=`<i data-lucide="${icon}" style="width:17px"></i>${label}`;
  d.onclick=()=>go(id);nav.appendChild(d);
});
const pagesEl=document.getElementById('pages');
function go(id){
  pagesEl.innerHTML=PAGES[id]||'';
  document.querySelectorAll('.navlink').forEach(n=>n.classList.toggle('active',n.dataset.id===id));
  const label=(NAV.find(n=>n[0]===id)||[,'Chat widget'])[1];
  document.getElementById('crumb').textContent=label;
  if(window.lucide)lucide.createIcons();
}
go('dashboard');
</script>
