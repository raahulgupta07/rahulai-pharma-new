<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CitCare — Aurora</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Noto+Sans+Myanmar:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root{
    --bg:#faf9f7;--surface:#fff;--s2:#f4f2ee;--s3:#efece6;
    --ink:#1a1a18;--ink2:#5f5e58;--ink3:#8a877f;
    --accent:#c96342;--accent-h:#b5512f;--accent-soft:#f4e7e1;
    --line:#e7e3dc;--line2:#dcd7ce;
    --green:#3f8f5f;--green-s:#e6f1ea;--amber:#b5862f;--amber-s:#f7eedd;
    --red:#c0392b;--red-s:#f8e7e4;--blue:#3573b5;--blue-s:#e6eff7;--violet:#7a5bd0;--violet-s:#ece6f8;
    --shadow:0 1px 2px rgba(20,20,18,.04),0 4px 14px rgba(20,20,18,.05);
    --shadow-lg:0 12px 44px rgba(20,20,18,.13);
  }
  html.dark{
    --bg:#15141a;--surface:#1e1d24;--s2:#26252e;--s3:#2e2d37;
    --ink:#ece9f0;--ink2:#a6a3b0;--ink3:#74717e;
    --accent:#e07a55;--accent-h:#ec8a66;--accent-soft:#3a2a23;
    --line:#322e3a;--line2:#423d4d;
    --green:#5fcf8a;--green-s:#16331f;--amber:#e0b25a;--amber-s:#3a2e12;
    --red:#f08a7d;--red-s:#3a1714;--blue:#73a9e8;--blue-s:#1a2740;--violet:#a98ef0;--violet-s:#241a3a;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.35);--shadow-lg:0 14px 50px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter','Noto Sans Myanmar',-apple-system,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
  .serif{font-family:'Fraunces','Noto Sans Myanmar',serif;font-weight:600;letter-spacing:-.015em}
  .mono{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace}
  .tnum{font-variant-numeric:tabular-nums}
  h1{margin:0;font-size:28px}h2{margin:0;font-size:16px}
  a{color:inherit;text-decoration:none}

  /* ---- top product tab bar ---- */
  .topbar{display:flex;align-items:center;gap:6px;padding:10px 20px;border-bottom:1px solid var(--line);background:var(--surface);position:sticky;top:0;z-index:40}
  .logo{display:flex;align-items:center;gap:9px;padding-right:14px;margin-right:6px}
  .logo .mark{width:32px;height:32px;border-radius:10px;background:linear-gradient(145deg,var(--accent),var(--accent-h));color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(201,99,66,.35)}
  .logo b{font-size:16px;font-weight:700;letter-spacing:-.01em}
  .logo small{font-size:9px;letter-spacing:.18em;color:var(--ink3);font-weight:600;display:block;margin-top:-2px}
  .tab{display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:10px;font-size:13.5px;font-weight:500;color:var(--ink2);cursor:pointer;transition:.15s}
  .tab:hover{background:var(--s2);color:var(--ink)}
  .tab.on{background:var(--s2);color:var(--ink);font-weight:600}
  .ico{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:10px;color:var(--ink3);cursor:pointer;transition:.15s}
  .ico:hover{background:var(--s2);color:var(--ink)}
  .bell{position:relative}.bell .n{position:absolute;top:3px;right:3px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px}

  /* ---- layout ---- */
  .shell{display:flex;height:calc(100vh - 57px)}
  .side{width:212px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--line);background:var(--surface);padding:14px 11px}
  .grp{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--ink3);text-transform:uppercase;padding:14px 11px 6px}
  .nav{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:9px;font-size:13.5px;color:var(--ink2);cursor:pointer;transition:.14s;font-weight:500}
  .nav:hover{background:var(--s2);color:var(--ink)}
  .nav.on{background:var(--accent-soft);color:var(--accent);font-weight:600}
  .nav .tag{margin-left:auto;font-size:10px;font-weight:700;background:var(--s2);color:var(--ink2);padding:1px 7px;border-radius:7px}
  .main{flex:1;overflow-y:auto;padding:22px 28px}
  .wrap{max-width:1080px;margin:0 auto}

  /* ---- status pill strip ---- */
  .strip{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
  .pill{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:7px 12px;font-size:12.5px;color:var(--ink2);font-weight:500;box-shadow:var(--shadow)}
  .pill b{color:var(--ink);font-weight:600}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

  /* ---- cards ---- */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
  .hero{display:grid;grid-template-columns:1.15fr 1.4fr .9fr;gap:24px;padding:22px 24px;align-items:center}
  .heroNum{font-size:54px;font-weight:700;line-height:1;letter-spacing:-.03em}
  .heroNum span{font-size:24px;color:var(--ink3)}
  .spark{display:flex;align-items:flex-end;gap:5px;height:78px}
  .spark i{flex:1;background:linear-gradient(180deg,var(--accent),var(--accent-h));border-radius:5px 5px 2px 2px;opacity:.9;transition:.2s;min-height:5px}
  .spark i:hover{opacity:1;transform:scaleY(1.04)}
  .hstat{text-align:right;padding:6px 0}
  .hstat b{font-size:21px;font-weight:700}.hstat span{display:block;font-size:11.5px;color:var(--ink3);margin-top:1px}

  /* ---- ask bar ---- */
  .ask{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:11px 15px;box-shadow:var(--shadow)}
  .ask input{flex:1;border:0;background:none;outline:none;font-size:14px;color:var(--ink);font-family:inherit}
  .ask input::placeholder{color:var(--ink3)}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:11px}
  .chip{font-size:12.5px;padding:6px 12px;border-radius:9px;border:1px solid var(--line);cursor:pointer;color:var(--ink2);transition:.15s;background:var(--surface)}
  .chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}

  /* ---- alert chips ---- */
  .alerts{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}
  .alert{display:flex;align-items:center;gap:9px;padding:9px 13px;border-radius:11px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid;transition:.15s}
  .alert:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
  .alert .cnt{font-size:11px;font-weight:700;border-radius:8px;padding:1px 8px}
  .a-r{background:var(--red-s);border-color:color-mix(in srgb,var(--red) 35%,transparent);color:var(--red)}.a-r .cnt{background:color-mix(in srgb,var(--red) 22%,transparent)}
  .a-a{background:var(--amber-s);border-color:color-mix(in srgb,var(--amber) 35%,transparent);color:var(--amber)}.a-a .cnt{background:color-mix(in srgb,var(--amber) 22%,transparent)}
  .a-b{background:var(--blue-s);border-color:color-mix(in srgb,var(--blue) 35%,transparent);color:var(--blue)}.a-b .cnt{background:color-mix(in srgb,var(--blue) 22%,transparent)}

  /* ---- ring cards ---- */
  .rings{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:14px 0}
  .ring{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px;display:flex;flex-direction:column;align-items:center;box-shadow:var(--shadow);transition:.18s}
  .ring:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
  .ring svg{transform:rotate(-90deg)}
  .ring .lbl{margin-top:12px;font-size:13px;font-weight:600}
  .ring .sub{font-size:11.5px;color:var(--ink3);margin-top:2px}
  .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ctr b{font-size:23px;font-weight:700}.ctr small{font-size:10px;color:var(--ink3);font-weight:600;text-transform:uppercase;letter-spacing:.05em}

  /* ---- stat row ---- */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:14px 0 4px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
  .stat .v{font-size:25px;font-weight:700;letter-spacing:-.02em}.stat .v span{font-size:14px;color:var(--ink3)}
  .stat .k{font-size:12.5px;color:var(--ink2);margin-top:3px}
  .stat .d{font-size:11.5px;margin-top:6px;font-weight:600}

  /* ---- table ---- */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);padding:11px 16px}
  td{padding:12px 16px;border-top:1px solid var(--line)}
  tbody tr{transition:.12s;cursor:pointer}tbody tr:hover{background:var(--s2)}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  .coin{font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 28%,transparent);border-radius:6px;padding:1px 6px;cursor:pointer;white-space:nowrap}
  .sup{font-size:10px;color:var(--accent);font-weight:600;vertical-align:super}

  /* ---- settings ---- */
  .setRow{display:flex;align-items:flex-start;gap:16px;padding:18px;border:1px solid var(--line);border-radius:14px;background:var(--surface);margin-bottom:14px;box-shadow:var(--shadow)}
  .setRow .t{font-size:14.5px;font-weight:600;margin-bottom:5px}
  .setRow .d{font-size:13px;color:var(--ink2);line-height:1.6;max-width:560px}
  .sw{flex-shrink:0;width:46px;height:27px;border-radius:20px;background:var(--line2);position:relative;cursor:pointer;transition:.2s;margin-top:2px}
  .sw::after{content:'';position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .sw.on{background:var(--green)}.sw.on::after{left:22px}
  .fld{margin:0 0 16px}.fld label{font-size:13px;font-weight:600;display:block;margin-bottom:6px}.fld .hint{font-weight:400;color:var(--ink3);font-size:12px}
  .inp{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:10px 13px;font-size:13.5px;color:var(--ink);outline:none;font-family:inherit;transition:.15s}
  .inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .preview{background:var(--s2);border:1px solid var(--line);border-radius:13px;padding:16px 18px;font-size:13.5px;line-height:1.7;color:var(--ink2)}
  .lbl-sm{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--ink3);text-transform:uppercase;margin-bottom:9px}

  .btn{display:inline-flex;align-items:center;gap:7px;border-radius:11px;padding:9px 15px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:var(--surface);color:var(--ink);transition:.15s}
  .btn:hover{background:var(--s2);border-color:var(--line2)}
  .btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-p:hover{background:var(--accent-h)}
  .seg{display:inline-flex;background:var(--s2);border-radius:10px;padding:3px}
  .seg span{padding:5px 13px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--ink2);cursor:pointer;transition:.15s}
  .seg span.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}

  .page{display:none;animation:fade .26s ease}.page.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--bg);padding:12px 19px;border-radius:13px;font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);opacity:0;transition:.28s;z-index:100;display:flex;align-items:center;gap:9px}
  #toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .ov{position:fixed;inset:0;background:rgba(20,20,18,.5);display:none;align-items:center;justify-content:center;z-index:90;backdrop-filter:blur(4px)}
  .ov.show{display:flex;animation:fade .2s}
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow-lg);width:430px;max-width:calc(100vw - 32px);padding:22px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  @media(max-width:1000px){.hero{grid-template-columns:1fr}.rings,.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<!-- TOP TAB BAR -->
<div class="topbar">
  <div class="logo"><span class="mark"><i data-lucide="pill" style="width:18px"></i></span><div><b>CitCare</b><small>PHARMA</small></div></div>
  <div class="tab" data-tab="chat" onclick="goTab('chat')"><i data-lucide="message-circle" style="width:16px"></i>Chat</div>
  <div class="tab on" data-tab="workspace" onclick="goTab('workspace')"><i data-lucide="layout-dashboard" style="width:16px"></i>Workspace</div>
  <div class="tab" data-tab="data" onclick="goTab('data')"><i data-lucide="database" style="width:16px"></i>Data</div>
  <div class="tab" data-tab="settings" onclick="goTab('settings')"><i data-lucide="settings" style="width:16px"></i>Settings</div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:4px">
    <div class="ico" onclick="toast('Search wired in live app','search')"><i data-lucide="search" style="width:18px"></i></div>
    <div class="ico bell" onclick="toast('20 alerts','bell')"><i data-lucide="bell" style="width:18px"></i><span class="n">20</span></div>
    <div class="ico" id="themeBtn" onclick="toggleTheme()"><i data-lucide="moon" style="width:18px"></i></div>
    <div style="display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;border-radius:11px;cursor:pointer" onclick="toast('Account menu')">
      <span style="width:30px;height:30px;border-radius:50%;background:linear-gradient(145deg,var(--accent),var(--accent-h));color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700">AD</span>
      <div style="line-height:1.2"><div style="font-size:13px;font-weight:600">admin</div><div style="font-size:10px;color:var(--ink3);letter-spacing:.05em">SUPER ADMIN</div></div>
    </div>
  </div>
</div>

<div class="shell">
  <!-- SIDEBAR (changes per tab) -->
  <aside class="side" id="side"></aside>
  <!-- MAIN -->
  <main class="main"><div class="wrap" id="pages"></div></main>
</div>

<div id="toast"></div>
<div class="ov" id="ov" onclick="if(event.target===this)closeModal()"><div class="modal" id="modal"></div></div>

<script>
const $=s=>document.querySelector(s);
let curTab='workspace', curPage='overview';

const SIDES={
  workspace:[['INSIGHTS',[['overview','Overview','layout-dashboard'],['conversations','Conversations','messages-square'],['evaluation','Evaluation','flask-conical'],['graph','Knowledge graph','share-2'],['stores','Stores','store']]]],
  data:[['DATA',[['catalog','Catalog','database'],['inventory','Inventory','boxes'],['sftp','SFTP uploads','server']]]],
  settings:[['CONFIG',[['answer','Answer behaviour','message-square'],['agent','Agent','bot'],['users','Users','users'],['tenants','Tenants','building-2'],['embed','Embed widget','code-2']]]],
  chat:[['ASSISTANT',[['chat','Chat tester','message-circle']]]]
};
const DEFPAGE={workspace:'overview',data:'catalog',settings:'answer',chat:'chat'};

function toast(m,ic='check'){const t=$('#toast');t.innerHTML=`<i data-lucide="${ic}" style="width:16px"></i>${m}`;t.classList.add('show');lucide.createIcons();clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2300);}
function toggleTheme(){const d=document.documentElement.classList.toggle('dark');$('#themeBtn').innerHTML=`<i data-lucide="${d?'sun':'moon'}" style="width:18px"></i>`;lucide.createIcons();}
function openModal(h){$('#modal').innerHTML=h;$('#ov').classList.add('show');lucide.createIcons();}
function closeModal(){$('#ov').classList.remove('show')}

function renderSide(){
  $('#side').innerHTML=SIDES[curTab].map(([g,items])=>`<div class="grp">${g}</div>`+items.map(([id,lbl,ic,tag])=>`<div class="nav ${id===curPage?'on':''}" onclick="goPage('${id}')"><i data-lucide="${ic}" style="width:17px"></i>${lbl}${tag?`<span class="tag">${tag}</span>`:''}</div>`).join('')).join('');
  lucide.createIcons();
}
function goTab(t){curTab=t;curPage=DEFPAGE[t];document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x.dataset.tab===t));renderSide();render();}
function goPage(p){curPage=p;renderSide();render();}

/* ---------- ring helper ---------- */
function ring(val,max,lbl,sub,color,suffix=''){
  const r=34,c=2*Math.PI*r,pct=Math.min(val/max,1),off=c*(1-pct);
  return `<div class="ring"><div style="position:relative;width:84px;height:84px">
    <svg width="84" height="84"><circle cx="42" cy="42" r="${r}" fill="none" stroke="var(--s2)" stroke-width="8"/>
    <circle cx="42" cy="42" r="${r}" fill="none" stroke="${color}" stroke-width="8" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"/></svg>
    <div class="ctr"><b>${val}${suffix}</b></div></div>
    <div class="lbl">${lbl}</div><div class="sub">${sub}</div></div>`;
}

/* ---------- pages ---------- */
const P={};
P.overview=()=>`
<div class="strip">
  <div class="pill"><span class="dot" style="background:var(--green)"></span><b>1</b> online</div>
  <div class="pill"><i data-lucide="message-square" style="width:14px"></i><b>780</b> today</div>
  <div class="pill"><i data-lucide="dollar-sign" style="width:14px"></i><b>$0.14</b> spend</div>
  <div class="pill"><i data-lucide="clock" style="width:14px"></i><b>51 ms</b> p95</div>
  <div class="pill"><span class="dot" style="background:var(--green)"></span>Healthy</div>
  <div class="pill"><i data-lucide="database" style="width:14px"></i><b>111,654</b> rows</div>
</div>

<div style="display:flex;align-items:flex-end;margin-bottom:18px">
  <div><h1 class="serif">Overview</h1><div style="margin-top:6px;font-size:13.5px;color:var(--ink2)">Agent health, data freshness &amp; usage — pharmacy-wide</div></div>
  <div style="margin-left:auto" class="seg"><span class="on">7d</span><span>30d</span><span>90d</span></div>
</div>

<div class="card hero" style="margin-bottom:18px">
  <div>
    <div class="heroNum">95.6<span>%</span></div>
    <div style="font-size:13.5px;color:var(--ink2);margin-top:8px;max-width:200px">answers served from cache or a cited source</div>
    <div style="font-size:12.5px;color:var(--green);font-weight:600;margin-top:8px"><span class="dot" style="background:var(--green);display:inline-block;margin-right:5px"></span>live · 780 answered this period</div>
  </div>
  <div class="spark">${[34,28,40,30,52,38,60,44,55,72,90,66].map(h=>`<i style="height:${h}%"></i>`).join('')}</div>
  <div>
    <div class="hstat"><b>53</b><span>active sites</span></div>
    <div class="hstat"><b>$0.14</b><span>llm spend</span></div>
    <div class="hstat"><b>13.2h</b><span>staff time saved</span></div>
  </div>
</div>

<div class="ask">
  <i data-lucide="sparkles" style="width:18px;color:var(--accent)"></i>
  <input placeholder="Ask about stock, blind spots, cold SKUs, accuracy…" onkeydown="if(event.key==='Enter'){toast('Routed to agent');this.value=''}">
  <button class="btn btn-p" onclick="toast('Routed to agent')">Ask</button>
</div>
<div class="chips">${['Which SKUs are out of stock?','Top sellers this week','How is answer accuracy?','What should I fix first?'].map(c=>`<span class="chip" onclick="toast('Asked: '+this?.textContent)">${c}</span>`).join('')}</div>

<div class="alerts">
  <div class="alert a-r" onclick="goTab('data')"><i data-lucide="package-x" style="width:16px"></i>Zero-stock SKUs<span class="cnt">37</span></div>
  <div class="alert a-a" onclick="toast('Last ingest 2 days ago')"><i data-lucide="clock-alert" style="width:16px"></i>Data 2 days old<span class="cnt">1</span></div>
  <div class="alert a-b" onclick="goTab('settings')"><i data-lucide="user-x" style="width:16px"></i>Failed logins<span class="cnt">5</span></div>
</div>

<div class="rings">
  ${ring(100,100,'Eval coverage','13 / 13 questions pass','var(--green)','%')}
  ${ring(95,100,'Cache hit','95.6% — cost saver','var(--accent)','%')}
  ${ring(88,100,'Citation trust','answers with sources','var(--violet)','%')}
  ${ring(100,100,'Ingest health','last load clean','var(--blue)','%')}
</div>

<div class="stats">
  <div class="stat"><div class="v">5,292</div><div class="k">Catalog SKUs</div><div class="d" style="color:var(--green)">▲ 18 new</div></div>
  <div class="stat"><div class="v">111,654</div><div class="k">Inventory rows</div><div class="d" style="color:var(--ink3)">53 sites</div></div>

/* ---- Settings · Answer behaviour (ARIA parity, better) ---- */
P.answer=()=>`
<h1 class="serif">Answer behaviour</h1>
<p style="color:var(--ink2);margin:7px 0 20px;max-width:640px">Per-project switches. Changes go live immediately — no redeploy — so one deployment can be tuned per client.</p>

<div class="setRow">
  <div style="flex:1"><div class="t">Inline citations</div>
  <div class="d">When ON, answers cite the exact source inline <span class="coin">p.4</span> and show clickable source coins. When OFF, answers are clean prose with no markers — good for client-facing widgets where sources shouldn't show.</div></div>
  <div class="sw on" id="sw1" onclick="this.classList.toggle('on');toast('Citations '+(this.classList.contains('on')?'on':'off'))"></div>
</div>

<div class="lbl-sm" style="margin:22px 0 9px">PREVIEW</div>
<div class="preview">
  PARACAP PARACETAMOL — total stock <b style="color:var(--ink)">14,963</b> units across 53 sites<span class="sup">[inventory]</span>. Substitutes: BIOGESIC, PANADOL<span class="sup">[catalog]</span>.
  <div style="margin-top:11px;display:flex;gap:7px"><span class="coin">1 · inventory balance</span><span class="coin">2 · catalog</span></div>
</div>

<div style="height:1px;background:var(--line);margin:26px 0"></div>

<h2 class="serif" style="font-size:17px">Bilingual &amp; safety</h2>
<p style="color:var(--ink2);margin:6px 0 16px;font-size:13.5px">How the agent handles language and medical guardrails.</p>

<div class="setRow"><div style="flex:1"><div class="t">Auto-detect Burmese ↔ English</div><div class="d">Reply in the same language the question was asked. Never translate article codes or brand names.</div></div><div class="sw on" onclick="this.classList.toggle('on')"></div></div>
<div class="setRow"><div style="flex:1"><div class="t">Append pharmacist disclaimer</div><div class="d">Every medical answer ends with “consult a licensed pharmacist before use.”</div></div><div class="sw on" onclick="this.classList.toggle('on')"></div></div>
<div class="setRow"><div style="flex:1"><div class="t">Auto-resolve data conflicts to newest file</div><div class="d">ON = a newer upload silently wins. OFF (recommended) = conflicts go to a review queue for a human.</div></div><div class="sw" onclick="this.classList.toggle('on')"></div></div>

<div style="height:1px;background:var(--line);margin:26px 0"></div>

<h2 class="serif" style="font-size:17px">Knowledge schema</h2>
<p style="color:var(--ink2);margin:6px 0 18px;font-size:13.5px">Conventions the agent uses to build the drug graph and detect contradictions.</p>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
  <div class="fld"><label>Freshness window <span class="hint">— stock older than this is “stale” (days)</span></label><input class="inp tnum" value="2"></div>
  <div class="fld"><label>Stock-out threshold <span class="hint">— flag SKU as out below this</span></label><input class="inp tnum" value="0"></div>
</div>
<div class="fld"><label>Entity types <span class="hint">(comma-separated — what becomes a graph node)</span></label><input class="inp" value="brand, generic, ingredient, category, condition, site"></div>
<div class="fld"><label>Contradiction attributes <span class="hint">(comma-separated — compared across sources)</span></label><input class="inp" value="price, stock, dosage, substitute, indication"></div>
<button class="btn btn-p" onclick="toast('Settings saved · live now')"><i data-lucide="check" style="width:15px"></i>Save changes</button>`;
